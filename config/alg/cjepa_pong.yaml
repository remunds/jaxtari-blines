ALG: "CJEPA"
EXP_NAME: "cjepa_pong"

PIXEL_BASED: false  # use OC observations

# C-JEPA specific
SLOT_DIM: 128
HISTORY_FRAMES: 3
PRED_FRAMES: 1
MAX_MASKED_SLOTS: 1  # max — actual k chosen randomly in [0, max_masked_slots]
ACTION_EMB_DIM: 128
FRAMESKIP: 4  # emulator steps per env step (temporal spacing)
FRAME_STACK_SIZE: 4  # K frames stacked per object observation via ObjectCentricWrapper

# Transformer
TRANSFORMER_DEPTH: 6
TRANSFORMER_HEADS: 16
TRANSFORMER_DIM_HEAD: 64
TRANSFORMER_MLP_DIM: 2048
TRANSFORMER_DROPOUT: 0.1

# Training
BATCH_SIZE: 256
SCAN_STEPS: 64
LEARNING_RATE: 1e-4
MAX_GRAD_NORM: 1.0
NUM_TRAIN_STEPS: 5000000
NUM_TRAIN_TRAJECTORIES: 5000
NUM_VAL_TRAJECTORIES: 500
TRAJECTORY_LENGTH: 500
NUM_ENVS: 128

# Evaluation
EVAL_EVERY: 5000
ROLLOUT_STEPS: 150
EVAL_VIZ: True
VIZ_FRAMES: 150
VIZ_START_FRAME: 50

# W&B
WANDB_MODE: "online"
PROJECT: "jaxtari-blines"
