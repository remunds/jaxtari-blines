ALG: CROSSQ
EXP_NAME: crossq

PIXEL_BASED: False
NATIVE_DOWNSCALING: True
NUM_ENVS: 1

TOTAL_TIMESTEPS: 10000000
BUFFER_SIZE: 200000
LEARNING_STARTS: 10000
CHUNK_SIZE: 1000

ACTOR_LR: 0.0003
CRITIC_LR: 0.0003
ALPHA_LR: 0.0003
ADAM_B1: 0.5              # CrossQ: Adam beta1 = 0.5
BATCH_SIZE: 64
TRAIN_FREQUENCY: 4
GAMMA: 0.99

CRITIC_HIDDEN: 1024       # CrossQ: wider critic
BN_MOMENTUM: 0.99         # CrossQ: BatchNorm momentum
TARGET_ENTROPY_SCALE: 0.3   # 0.89 (cleanrl) is tuned for 18 actions; too high for small action sets -> alpha explosion
ALPHA_MAX: 1.0              # safety ceiling for autotuned entropy temperature

EVAL_EVERY: 10
SAVE_PATH: ./models

RUN_NAME: v1_crossq_oc_original
