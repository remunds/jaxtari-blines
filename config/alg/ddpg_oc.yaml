ALG: DDPG
EXP_NAME: ddpg

PIXEL_BASED: False
NATIVE_DOWNSCALING: True
NUM_ENVS: 1

TOTAL_TIMESTEPS: 10000000
BUFFER_SIZE: 200000
LEARNING_STARTS: 10000
CHUNK_SIZE: 1000

# TUNED = tier-1 stability pass (v4): actor LR split, TD3-style delay, fast anneal.

ACTOR_LR: 0.0001
CRITIC_LR: 0.0003
POLICY_DELAY: 2
GUMBEL_ANNEAL_FRACTION: 0.3
BATCH_SIZE: 32
TRAIN_FREQUENCY: 4
GAMMA: 0.99
TAU: 0.005          # polyak coefficient for soft target updates
VARIANT: gumbel_st  # Q(s,a)-critic + straight-through gumbel actor (MADDPG-style)
GUMBEL_TAU_START: 2.0   # annealed sampling/relaxation temperature
GUMBEL_TAU_END: 0.5
GUMBEL_TAU: 1.0     # only used by VARIANT: expected_q (failed ablation, kept for record)
START_E: 1.0        # epsilon-greedy floor: v1 (gumbel-only) locked into a
END_E: 0.01         # deterministic bad policy and stayed at -21 for 10M steps
EXPLORATION_FRACTION: 0.10

EVAL_EVERY: 10
SAVE_PATH: ./models

